<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Unbroken — An infinite procedural one-stroke puzzle game. Recreate geometric figures in a single continuous line.">
    <meta name="theme-color" content="#0a0a0f">
    <title>UNBROKEN — One Stroke Puzzle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Mood Aura Overlay -->
    <div id="mood-aura"></div>

    <!-- UI Overlay Container (menus, screens) -->
    <div id="ui-container"></div>

    <!-- Game Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- HUD Container (in-game controls) -->
    <div id="hud-container"></div>

    <!-- Audio Debug Panel (toggle with D key) -->
    <div id="audio-debug" class="hidden">
        <div class="debug-header">♫ Audio Debug</div>
        <div class="debug-bars">
            <div class="debug-row">
                <span class="debug-label">Energy</span>
                <div class="debug-bar-bg"><div id="dbg-energy-bar" class="debug-bar-fill energy"></div></div>
                <span id="dbg-energy-val" class="debug-val">0.00</span>
            </div>
            <div class="debug-row">
                <span class="debug-label">Valence</span>
                <div class="debug-bar-bg"><div id="dbg-valence-bar" class="debug-bar-fill valence"></div></div>
                <span id="dbg-valence-val" class="debug-val">0.00</span>
            </div>
        </div>
        <div class="debug-info">
            <span id="dbg-mood" class="debug-mood">ambient</span>
            <span id="dbg-bpm" class="debug-bpm">68 BPM</span>
        </div>
        <div id="dbg-chord" class="debug-chord">—</div>
        <div id="dbg-prog" class="debug-prog">—</div>
        <div id="dbg-layers" class="debug-layers">—</div>
        <div id="dbg-beat" class="debug-beat">
            <span class="beat-dot"></span><span class="beat-dot"></span>
            <span class="beat-dot"></span><span class="beat-dot"></span>
        </div>
    </div>

    <!-- Main Script -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
